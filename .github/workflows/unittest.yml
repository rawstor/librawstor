name: unittest

on:
  push:

jobs:
  unittest:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        without-liburing:
        - 
        - --without-liburing
        include:
        - packages: liburing-dev
          without-liburing:

    env:
      ASAN_OPTIONS: detect_odr_violation=0
    steps:
    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxxhash-dev libgtest-dev ${{ matrix.packages }}
    - uses: actions/checkout@v6
    - name: autogen
      run: ./autogen.sh
    - name: configure
      run: ./configure --enable-asan ${{ matrix.without-liburing }}
    - name: make
      run: make -j$(nproc)
    - name: make test
      run: make test

  testio:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        without-liburing:
        - 
        - --without-liburing

    steps:
    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxxhash-dev liburing-dev
    - uses: actions/checkout@v6
      with:
        path: librawstor
    - name: install librawstor
      run: |
        pushd .
        cd ./librawstor
        ./autogen.sh
        ./configure --enable-trace --disable-shared --enable-asan --disable-tests ${{ matrix.without-liburing }}
        make -j$(nproc)
        sudo make install
        popd
    - name: start rawstor-ost
      run: |
        mkdir /tmp/ost_objects
        rawstor-ost --bind 127.0.0.1:8080 --location file:///tmp/ost_objects/ &
        sleep 10
    - name: create object file,ost
      run: |
        mkdir /tmp/file_objects
        target=$(rawstor-cli create --location file:///tmp/file_objects,ost://127.0.0.1:8080 --size=1G)
        echo "TARGET=${target}" >> $GITHUB_ENV
    - name: testio file,ost
      run: |
        rawstor-cli testio --target=${TARGET} --block-size=4K --io-depth=1 --count=10
        rawstor-cli testio --target=${TARGET} --block-size=4K --io-depth=1 --count=10 --vector-mode
    - name: create object ost,file
      run: |
        target=$(rawstor-cli create --location ost://127.0.0.1:8080,file:///tmp/objects --size=1G)
        echo "TARGET=${target}" >> $GITHUB_ENV
    - name: testio ost,file
      run: |
        rawstor-cli testio --target=${TARGET} --block-size=4K --io-depth=1 --count=10
        rawstor-cli testio --target=${TARGET} --block-size=4K --io-depth=1 --count=10 --vector-mode
    - name: (ost) stop rawstor_ost
      run: killall rawstor-ost
